<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ABNT.fácil — Entrar</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0G3EQVXCJ8"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-0G3EQVXCJ8');
</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css"/>
  <link rel="stylesheet" href="/static/css/auth.css"/>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7266606205387680"
     crossorigin="anonymous"></script>
</head>
<body class="auth-body">

  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">ABNT<span>.fácil</span></a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">

      <div class="auth-hero">
        <h1>Bem-vindo ao<br/><span>ABNT.fácil</span></h1>
        <p>Formate seus trabalhos acadêmicos em segundos, com capa, folha de rosto e formatação ABNT correta.</p>
      </div>

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="trocarTab('login')">Entrar</button>
        <button class="auth-tab" onclick="trocarTab('cadastro')">Criar conta</button>
      </div>

      <!-- LOGIN -->
      <div class="auth-form" id="form-login">
        <button class="btn-google" onclick="window.location.href='/auth/google'">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continuar com Google
        </button>

        <div class="auth-divider"><span>ou</span></div>

        <div class="campo">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" />
        </div>
        <div class="campo">
          <label for="login-senha">Senha</label>
          <input type="password" id="login-senha" placeholder="Sua senha" />
        </div>

        <div id="login-erro" class="auth-erro oculto"></div>

        <button class="btn-auth" onclick="fazerLogin()">Entrar</button>

        <p class="auth-link">Não tem conta? <a onclick="trocarTab('cadastro')">Criar conta grátis</a></p>
      </div>

      <!-- CADASTRO -->
      <div class="auth-form oculto" id="form-cadastro">
        <button class="btn-google" onclick="window.location.href='/auth/google'">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Cadastrar com Google
        </button>

        <div class="auth-divider"><span>ou</span></div>

        <div class="campo">
          <label for="cad-nome">Nome</label>
          <input type="text" id="cad-nome" placeholder="Seu nome" />
        </div>
        <div class="campo">
          <label for="cad-email">E-mail</label>
          <input type="email" id="cad-email" placeholder="seu@email.com" />
        </div>
        <div class="campo">
          <label for="cad-senha">Senha <span class="dica">(mínimo 6 caracteres)</span></label>
          <input type="password" id="cad-senha" placeholder="Crie uma senha" />
        </div>

        <div id="cad-erro" class="auth-erro oculto"></div>

        <button class="btn-auth" onclick="fazerCadastro()">Criar conta grátis</button>

        <p class="auth-link">Já tem conta? <a onclick="trocarTab('login')">Entrar</a></p>
      </div>

    </div>
  </main>

  <script>
    function trocarTab(tab) {
      document.querySelectorAll(".auth-tab").forEach((t, i) => {
        t.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "cadastro"));
      });
      document.getElementById("form-login").classList.toggle("oculto", tab !== "login");
      document.getElementById("form-cadastro").classList.toggle("oculto", tab !== "cadastro");
    }

    async function fazerLogin() {
      const email = document.getElementById("login-email").value.trim();
      const senha = document.getElementById("login-senha").value.trim();
      const erroEl = document.getElementById("login-erro");
      erroEl.classList.add("oculto");

      try {
        const resp = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, senha })
        });
        const data = await resp.json();
        if (!resp.ok) { erroEl.textContent = data.erro; erroEl.classList.remove("oculto"); return; }
        window.location.href = "/formatar";
      } catch { erroEl.textContent = "Erro de conexão."; erroEl.classList.remove("oculto"); }
    }

    async function fazerCadastro() {
      const nome  = document.getElementById("cad-nome").value.trim();
      const email = document.getElementById("cad-email").value.trim();
      const senha = document.getElementById("cad-senha").value.trim();
      const erroEl = document.getElementById("cad-erro");
      erroEl.classList.add("oculto");

      try {
        const resp = await fetch("/auth/cadastro", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nome, email, senha })
        });
        const data = await resp.json();
        if (!resp.ok) { erroEl.textContent = data.erro; erroEl.classList.remove("oculto"); return; }
        window.location.href = "/formatar";
      } catch { erroEl.textContent = "Erro de conexão."; erroEl.classList.remove("oculto"); }
    }

    // Enter para submeter
    document.addEventListener("keydown", e => {
      if (e.key !== "Enter") return;
      const loginVisivel = !document.getElementById("form-login").classList.contains("oculto");
      if (loginVisivel) fazerLogin(); else fazerCadastro();
    });
  </script>
</body>
</html>
